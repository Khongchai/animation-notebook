<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freehand + Delaunator</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
      }
      canvas {
        display: block;
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
        touch-action: none;
      }
      #c2d {
        pointer-events: none;
      }
      body.mode-2d #gl {
        display: none;
      }
      body.mode-2d #c2d {
        pointer-events: auto;
      }
      body.mode-gl #c2d {
        display: none;
      }
      #hint {
        position: fixed;
        top: 10px;
        left: 12px;
        color: #888;
        font: 12px monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <canvas id="c2d"></canvas>
    <div id="hint">
      drag to draw &middot; double-click to clear &middot; press [t] to toggle
      renderer (webgl / 2d)
    </div>
    <script type="module">
      import { getStroke } from "perfect-freehand";
      import libtess from "libtess";

      // Set up a reusable libtess tesselator. Uses the NONZERO winding rule so
      // self-intersecting outlines (sharp corners in perfect-freehand strokes)
      // tessellate as their union — no stray triangles, no flicker.
      const tessy = (() => {
        const t = new libtess.GluTesselator();
        t.gluTessCallback(
          libtess.gluEnum.GLU_TESS_VERTEX_DATA,
          (data, out) => out.push(data[0], data[1]),
        );
        t.gluTessCallback(libtess.gluEnum.GLU_TESS_BEGIN, (type) => {
          if (type !== libtess.primitiveType.GL_TRIANGLES)
            console.warn("libtess: expected GL_TRIANGLES, got", type);
        });
        t.gluTessCallback(libtess.gluEnum.GLU_TESS_ERROR, (err) =>
          console.error("libtess error:", err),
        );
        t.gluTessCallback(
          libtess.gluEnum.GLU_TESS_COMBINE,
          (coords) => [coords[0], coords[1], coords[2]],
        );
        // Registering an (even empty) edge-flag callback forces libtess to
        // emit independent GL_TRIANGLES rather than strips/fans.
        t.gluTessCallback(libtess.gluEnum.GLU_TESS_EDGE_FLAG, () => {});
        return t;
      })();

      /**
       * Tesselate a polygon (possibly self-intersecting) into a flat array of
       * triangle vertex coordinates: [x0,y0, x1,y1, x2,y2, ...]. Every 3
       * consecutive pairs form one triangle.
       * @param {[number, number][]} points
       * @returns {number[]}
       */
      const tessellate = (points) => {
        const out = [];
        tessy.gluTessProperty(
          libtess.gluEnum.GLU_TESS_WINDING_RULE,
          libtess.windingRule.GLU_TESS_WINDING_NONZERO,
        );
        tessy.gluTessNormal(0, 0, 1);
        tessy.gluTessBeginPolygon(out);
        tessy.gluTessBeginContour();
        for (const [x, y] of points) {
          tessy.gluTessVertex([x, y, 0], [x, y]);
        }
        tessy.gluTessEndContour();
        tessy.gluTessEndPolygon();
        return out;
      };

      const average = (a, b) => (a + b) / 2;
      function getSvgPathFromStroke(points, closed = true) {
        const len = points.length;

        if (len < 4) {
          return ``;
        }

        let a = points[0];
        let b = points[1];
        const c = points[2];

        let result = `M${a[0].toFixed(2)},${a[1].toFixed(2)} Q${b[0].toFixed(
          2,
        )},${b[1].toFixed(2)} ${average(b[0], c[0]).toFixed(2)},${average(
          b[1],
          c[1],
        ).toFixed(2)} T`;

        for (let i = 2, max = len - 1; i < max; i++) {
          a = points[i];
          b = points[i + 1];
          result += `${average(a[0], b[0]).toFixed(2)},${average(
            a[1],
            b[1],
          ).toFixed(2)} `;
        }

        if (closed) {
          result += "Z";
        }

        return result;
      }

      const canvas = document.getElementById("gl");
      const canvas2d = document.getElementById("c2d");
      const ctx = canvas2d.getContext("2d");
      const gl = canvas.getContext("webgl", { antialias: true });
      if (!gl) throw new Error("WebGL not supported");

      let mode = "gl"; // "gl" | "2d"
      document.body.classList.add("mode-gl");
      const setMode = (m) => {
        mode = m;
        document.body.classList.remove("mode-gl", "mode-2d");
        document.body.classList.add(`mode-${m}`);
        render();
      };
      window.addEventListener("keydown", (e) => {
        if (e.key === "t" || e.key === "T")
          setMode(mode === "gl" ? "2d" : "gl");
      });

      const dpr = window.devicePixelRatio || 1;
      const resize = () => {
        for (const c of [canvas, canvas2d]) {
          c.width = c.clientWidth * dpr;
          c.height = c.clientHeight * dpr;
        }
        gl.viewport(0, 0, canvas.width, canvas.height);
      };

      const vs = `
        attribute vec2 a_position;
        uniform vec2 u_resolution;
        void main() {
          vec2 clip = (a_position / u_resolution) * 2.0 - 1.0;
          gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
        }
      `;
      const fs = `
        precision mediump float;
        uniform vec4 u_color;
        void main() { gl_FragColor = u_color; }
      `;

      const compile = (type, src) => {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
          throw new Error(gl.getShaderInfoLog(s));
        return s;
      };
      const program = gl.createProgram();
      gl.attachShader(program, compile(gl.VERTEX_SHADER, vs));
      gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS))
        throw new Error(gl.getProgramInfoLog(program));
      gl.useProgram(program);

      const posLoc = gl.getAttribLocation(program, "a_position");
      const resLoc = gl.getUniformLocation(program, "u_resolution");
      const colorLoc = gl.getUniformLocation(program, "u_color");
      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      /** @type {Array<Array<[number, number, number]>>} committed strokes (input points w/ pressure) */
      const strokes = [];
      /** @type {Array<[number, number, number]> | null} */
      let current = null;

      const strokeOptions = {
        size: 16,
        thinning: 0.6,
        smoothing: 0.5,
        streamline: 0.5,
        simulatePressure: true,
        last: true,
      };

      /**
       * Parse an SVG path string (as produced by getSvgPathFromStroke — i.e. only
       * M / Q / T / Z commands with comma-separated `x,y` pairs) into an array of
       * 2D points. We don't distinguish control vs. endpoint here because for
       * triangulation we just want the point set; control points sit on the stroke
       * outline anyway and endpoints are midpoints between them.
       * @param {string} path
       * @returns {[number, number][]}
       */
      const parseSvgPathToPoints = (path) => {
        const points = [];
        const re = /(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/g;
        let m;
        while ((m = re.exec(path)) !== null) {
          points.push([parseFloat(m[1]), parseFloat(m[2])]);
        }
        return points;
      };

      const triangulate = (inputPoints) => {
        const outline = /** @type {[number, number][]} */ (
          getStroke(inputPoints, strokeOptions)
        );
        const path = getSvgPathFromStroke(outline);
        const points = parseSvgPathToPoints(path);
        if (points.length < 3) return null;
        // libtess resolves self-intersections via the NONZERO winding rule and
        // emits triangle vertex coords directly (no index array needed).
        const verts = tessellate(points);
        return verts;
      };

      const render = () => {
        gl.clearColor(0.07, 0.07, 0.07, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform2f(resLoc, canvas.width, canvas.height);
        gl.uniform4f(colorLoc, 0.4, 0.8, 1.0, 1.0);

        const drawStroke = (pts) => {
          const t = triangulate(pts);
          if (!t || t.length < 6) return;
          // scale to device pixels for the GL viewport
          const verts = new Float32Array(t.length);
          for (let i = 0; i < t.length; i++) verts[i] = t[i] * dpr;
          gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STREAM_DRAW);
          gl.drawArrays(gl.TRIANGLES, 0, t.length / 2);
        };

        for (const s of strokes) {
          drawStroke(s);
        }
        if (current && current.length > 1) drawStroke(current);
      };

      const pointerPos = (e) => {
        const r = canvas.getBoundingClientRect();
        return [e.clientX - r.left, e.clientY - r.top, e.pressure || 0.5];
      };

      canvas.addEventListener("pointerdown", (e) => {
        canvas.setPointerCapture(e.pointerId);
        current = [pointerPos(e)];
        render();
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!current) return;
        current.push(pointerPos(e));
        render();
      });
      const endStroke = (e) => {
        if (!current) return;
        current.push(pointerPos(e));
        if (current.length > 1) strokes.push(current);
        current = null;
        render();
      };
      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);
      canvas.addEventListener("dblclick", () => {
        strokes.length = 0;
        current = null;
        render();
      });

      window.addEventListener("resize", () => {
        resize();
        render();
      });
      resize();
      render();
    </script>
  </body>
</html>
